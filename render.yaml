services:
  # 1. React Frontend (Vite)
  - type: web
    name: hackblr-frontend
    env: static
    buildCommand: cd HackBLR && npm install && npm run build
    publishPath: HackBLR/dist
    branch: main
    envVars:
      - key: VITE_VAPI_PUBLIC_KEY
        sync: false
      - key: VITE_VAPI_ASSISTANT_ID
        sync: false

  # 2. Node.js Search API
  - type: web
    name: hackblr-node-api
    env: node
    buildCommand: cd HackBLR && npm install
    startCommand: cd HackBLR && node api/server.js
    branch: main
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  # 3. Python Semantic Search API
  - type: web
    name: hackblr-python-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    branch: main
    envVars:
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
